name: Build unsigned iOS IPA

on:
  workflow_dispatch:
    inputs:
      org:
        description: "Reverse-domain org prefix"
        required: true
        default: "com.amrmoamed11433"
      bundle_id:
        description: "Unique iOS Bundle ID"
        required: true
        default: "com.amrmoamed11433.wepackagesmanager"
      app_name:
        description: "Visible app name on iPhone"
        required: true
        default: "WE Packages Manager"

jobs:
  build_unsigned_ipa:
    name: Build unsigned IPA on macOS
    runs-on: macos-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Install Flutter stable
        shell: bash
        run: |
          git clone https://github.com/flutter/flutter.git --depth 1 -b stable "$HOME/flutter"
          echo "$HOME/flutter/bin" >> "$GITHUB_PATH"

      - name: Show Flutter and Xcode versions
        shell: bash
        run: |
          flutter --version
          xcodebuild -version
          flutter doctor -v

      - name: Generate or repair iOS project
        shell: bash
        run: |
          if [ ! -d "ios" ]; then
            echo "iOS folder missing. Creating iOS platform files..."
            flutter create --platforms=ios --org "${{ github.event.inputs.org }}" .
          fi

          if [ ! -f "ios/Runner.xcodeproj/project.pbxproj" ]; then
            echo "iOS Xcode project missing. Recreating iOS platform files..."
            flutter create --platforms=ios --org "${{ github.event.inputs.org }}" .
          fi

      - name: Create Podfile if missing
        shell: bash
        run: |
          if [ ! -f "ios/Podfile" ]; then
            echo "Podfile missing. Creating Flutter iOS Podfile..."

            cat > ios/Podfile <<'EOF'
platform :ios, '13.0'

ENV['COCOAPODS_DISABLE_STATS'] = 'true'

project 'Runner', {
  'Debug' => :debug,
  'Profile' => :release,
  'Release' => :release,
}

def flutter_root
  generated_xcode_build_settings_path = File.expand_path(File.join('..', 'Flutter', 'Generated.xcconfig'), __FILE__)
  unless File.exist?(generated_xcode_build_settings_path)
    raise "#{generated_xcode_build_settings_path} must exist. If you're running pod install manually, make sure flutter pub get is executed first"
  end

  File.foreach(generated_xcode_build_settings_path) do |line|
    matches = line.match(/FLUTTER_ROOT\=(.*)/)
    return matches[1].strip if matches
  end

  raise "FLUTTER_ROOT not found in #{generated_xcode_build_settings_path}. Try deleting Generated.xcconfig, then run flutter pub get"
end

require File.expand_path(File.join('packages', 'flutter_tools', 'bin', 'podhelper'), flutter_root)

flutter_ios_podfile_setup

target 'Runner' do
  use_frameworks!
  use_modular_headers!

  flutter_install_all_ios_pods File.dirname(File.realpath(__FILE__))
end

post_install do |installer|
  installer.pods_project.targets.each do |target|
    flutter_additional_ios_build_settings(target)

    target.build_configurations.each do |config|
      config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '13.0'
    end
  end
end
EOF
          fi

          echo "Checking ios folder:"
          ls -la ios

          echo "Checking Podfile:"
          cat ios/Podfile

      - name: Configure iOS bundle id and app name
        shell: bash
        run: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName ${{ github.event.inputs.app_name }}" ios/Runner/Info.plist || true
          /usr/libexec/PlistBuddy -c "Set :CFBundleName ${{ github.event.inputs.app_name }}" ios/Runner/Info.plist || true

          perl -0777 -i -pe "s/PRODUCT_BUNDLE_IDENTIFIER = [^;]+;/PRODUCT_BUNDLE_IDENTIFIER = ${{ github.event.inputs.bundle_id }};/g" ios/Runner.xcodeproj/project.pbxproj

      - name: Fix Flutter localization imports
        shell: bash
        run: |
          flutter pub get
          flutter gen-l10n || true

          GEN_FILE=$(find . -name "app_localizations.dart" | head -n 1)

          if [ -n "$GEN_FILE" ]; then
            echo "Found localization file at: $GEN_FILE"

            mkdir -p lib/gen_l10n
            GEN_DIR=$(dirname "$GEN_FILE")
            cp "$GEN_DIR"/*.dart lib/gen_l10n/

            find lib -name "*.dart" -type f -exec perl -0pi -e 's#package:flutter_gen/gen_l10n/#package:we_packages_manager/gen_l10n/#g' {} \;

            echo "Fixed imports:"
            grep -R "gen_l10n/app_localizations.dart" lib || true
          else
            echo "No app_localizations.dart generated. Skipping localization import fix."
          fi

      - name: Prepare Flutter iOS config
        shell: bash
        run: |
          flutter pub get
          flutter build ios --release --no-codesign --config-only

      - name: Install iOS pods
        shell: bash
        run: |
          if [ ! -f "ios/Podfile" ]; then
            echo "Podfile missing before pod install"
            ls -la ios || true
            exit 1
          fi

          cd ios
          pod install --repo-update
          cd ..

      - name: Build unsigned iOS app
        shell: bash
        run: |
          xcodebuild \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build/ios_xcode \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Create unsigned IPA
        shell: bash
        run: |
          rm -rf Payload
          mkdir -p Payload

          APP_PATH=$(find build/ios_xcode -name "Runner.app" -type d | head -n 1)

          if [ -z "$APP_PATH" ]; then
            echo "Runner.app not found"
            find build -name "*.app" -type d || true
            exit 1
          fi

          echo "Found app at: $APP_PATH"

          cp -R "$APP_PATH" Payload/
          zip -r WE_Packages_Manager_unsigned.ipa Payload

      - name: Upload unsigned IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: WE_Packages_Manager_unsigned_ipa
          path: WE_Packages_Manager_unsigned.ipa
          if-no-files-found: error
