name: Build unsigned iOS IPA

on:
  workflow_dispatch:
    inputs:
      org:
        description: "Reverse-domain org prefix"
        required: true
        default: "com.amrmoamed11433"
      bundle_id:
        description: "Unique iOS Bundle ID"
        required: true
        default: "com.amrmoamed11433.wepackagesmanager"
      app_name:
        description: "Visible app name on iPhone"
        required: true
        default: "WE Packages Manager"

jobs:
  build_unsigned_ipa:
    name: Build unsigned IPA on macOS
    runs-on: macos-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Install Flutter stable
        shell: bash
        run: |
          git clone https://github.com/flutter/flutter.git --depth 1 -b stable "$HOME/flutter"
          echo "$HOME/flutter/bin" >> "$GITHUB_PATH"

      - name: Show Flutter and Xcode versions
        shell: bash
        run: |
          flutter --version
          xcodebuild -version
          flutter doctor -v

      - name: Precache Flutter iOS artifacts
        shell: bash
        run: |
          flutter precache --ios

      - name: Generate or repair iOS project
        shell: bash
        run: |
          if [ ! -d "ios" ]; then
            echo "iOS folder missing. Creating iOS platform files..."
            flutter create --platforms=ios --org "${{ github.event.inputs.org }}" .
          fi

          if [ ! -f "ios/Runner.xcodeproj/project.pbxproj" ]; then
            echo "iOS Xcode project missing. Recreating iOS platform files..."
            flutter create --platforms=ios --org "${{ github.event.inputs.org }}" .
          fi

      - name: Remove CocoaPods integration if present
        shell: bash
        run: |
          if [ -d "ios" ]; then
            cd ios

            if [ -f "Podfile" ] || [ -d "Pods" ]; then
              echo "Removing old CocoaPods integration..."
              pod deintegrate || true
            fi

            rm -rf Pods
            rm -f Podfile
            rm -f Podfile.lock

            cd ..
          fi

      - name: Configure iOS bundle id and app name
        shell: bash
        run: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName ${{ github.event.inputs.app_name }}" ios/Runner/Info.plist || true
          /usr/libexec/PlistBuddy -c "Set :CFBundleName ${{ github.event.inputs.app_name }}" ios/Runner/Info.plist || true

          perl -0777 -i -pe "s/PRODUCT_BUNDLE_IDENTIFIER = [^;]+;/PRODUCT_BUNDLE_IDENTIFIER = ${{ github.event.inputs.bundle_id }};/g" ios/Runner.xcodeproj/project.pbxproj

      - name: Fix Flutter localization imports
        shell: bash
        run: |
          flutter pub get
          flutter gen-l10n || true

          PACKAGE_NAME=$(grep '^name:' pubspec.yaml | head -n 1 | sed 's/name:[[:space:]]*//' | tr -d '"' | tr -d "'")

          if [ -z "$PACKAGE_NAME" ]; then
            echo "Could not detect package name from pubspec.yaml"
            exit 1
          fi

          echo "Detected package name: $PACKAGE_NAME"

          GEN_FILE=$(find . -name "app_localizations.dart" | head -n 1)

          if [ -n "$GEN_FILE" ]; then
            echo "Found localization file at: $GEN_FILE"

            mkdir -p lib/gen_l10n
            GEN_DIR=$(dirname "$GEN_FILE")
            cp "$GEN_DIR"/*.dart lib/gen_l10n/

            find lib -name "*.dart" -type f -exec perl -0pi -e "s#package:flutter_gen/gen_l10n/#package:${PACKAGE_NAME}/gen_l10n/#g" {} \;

            echo "Fixed localization imports:"
            grep -R "gen_l10n/app_localizations.dart" lib || true
          else
            echo "No app_localizations.dart generated. Skipping localization import fix."
          fi

      - name: Prepare Flutter iOS config only
        shell: bash
        run: |
          flutter pub get
          flutter build ios --release --no-codesign --config-only

      - name: Build unsigned iOS app with xcodebuild
        shell: bash
        run: |
          xcodebuild \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build/ios_xcode \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            build

      - name: Create unsigned IPA
        shell: bash
        run: |
          rm -rf Payload
          mkdir -p Payload

          APP_PATH=$(find build/ios_xcode -name "Runner.app" -type d | head -n 1)

          if [ -z "$APP_PATH" ]; then
            echo "Runner.app not found in build/ios_xcode"
            echo "Searching all build folder..."
            find build -name "*.app" -type d || true
            exit 1
          fi

          echo "Found app at: $APP_PATH"

          cp -R "$APP_PATH" Payload/
          zip -r WE_Packages_Manager_unsigned.ipa Payload

      - name: Upload unsigned IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: WE_Packages_Manager_unsigned_ipa
          path: WE_Packages_Manager_unsigned.ipa
          if-no-files-found: error
